<header class="navbar bg-base-100 border-b border-base-300 px-4 lg:px-6 min-h-[4rem]">
    <div class="flex-none lg:hidden">
        <label for="sidebar-toggle" class="btn btn-square btn-ghost">
            <i data-lucide="menu" class="w-5 h-5"></i>
        </label>
    </div>
    <div class="flex-1">
        <h2 class="text-lg font-semibold text-base-content">{% block page_title %}{% endblock %}</h2>
    </div>
    <div class="flex items-center gap-2">
        {% if active_exam %}
        <div class="badge badge-primary badge-outline gap-1 hidden sm:flex">
            <i data-lucide="file-text" class="w-3 h-3"></i>
            {{ active_exam.code }}
        </div>
        {% endif %}
    </div>
</header>
